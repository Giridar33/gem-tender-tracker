name: daily-pipeline

on:
  schedule:
    - cron: "0 2 * * *"   # Every day at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger from the Actions tab

jobs:
  run-pipeline:
    name: Scrape → Clean → Load
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (single-shot mode)
        run: python -m src.scheduler
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPE_BASE_URL: ${{ secrets.SCRAPE_BASE_URL }}
          MAX_PAGES: ${{ vars.MAX_PAGES || '50' }}
          REQUEST_DELAY: ${{ vars.REQUEST_DELAY || '1.5' }}
          REQUEST_TIMEOUT: ${{ vars.REQUEST_TIMEOUT || '15' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}    # optional
